name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - run: go mod download
      - run: gofmt -d ./cmd ./internal
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./cmd/polygeo
